# DATA-EXP catalogue seed — Datasets + Variables for US-DATA-EXP-001.
#
# Authority: ADR-0023 §D5 (metadata-driven catalogue, seeded INACTIVE,
# dual-approval activation). Loader: apps.data_explorer.metadata_loader.
#
# Every variable below traces to one of:
#   * an existing field on apps.data_management.models (concrete column);
#   * an existing apps.reference_data ChoiceList (value_domain);
#   * an explicit derived_from computation (PMT band, completeness %, ...);
#   * the apps.partners / apps.referral models (programme/referral).
#
# PrivacyClass defaults (ADR-0023 §D3, locked):
#   Public    k=0   → geographic codes + administrative attributes
#   Internal  k=5   → household composition counts, dwelling chars, asset ownership
#   Personal  k=10  → member-level demographic/education/employment/health-status indicators
#   Sensitive  —    → NIN, biometrics, GPS point, encrypted chronic-illness types
#
# Geographic floor (ADR-0023 §D4): sub_county for Public/Internal,
# sub_region for Personal, blocked for Sensitive. Parish + village
# carry `aggregated_only: false` + `requires_drs_handoff: true`.
#
# DPO override at activation time is expected — these defaults are the
# starting position, not the final assignment.

datasets:

  - code: "household"
    label: "Household"
    description: >
      One row per registered household, current state. Source of
      truth for household-level composition, geography, dwelling,
      utilities, livelihood, food security, food consumption and
      PMT score.
    source_module: "data_management"
    source_model: "Household"
    primary_grain: "household"
    default_refresh_cadence: "daily"
    questionnaire_sections: ["A", "B", "G", "H", "I"]
    notes: >
      `mv_explorer_household_by_subcounty_demographics` and
      `mv_explorer_household_by_subcounty_pmt` aggregate against
      this dataset.

  - code: "member"
    label: "Household member"
    description: >
      One row per individual member of a registered household, current
      state. Demographic identity, NIN-status, marital status,
      relationship-to-head, telephone presence flags.
    source_module: "data_management"
    source_model: "Member"
    primary_grain: "member"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["C", "D", "E", "F"]
    notes: >
      Personal-class variables aggregate at sub-region only
      (`mv_explorer_member_by_subcounty_*` reshape to sub_region in
      the matview definition).

  - code: "dwelling"
    label: "Dwelling unit"
    description: >
      One row per household-dwelling pairing. Tenure, type, room
      counts, roof / wall / floor materials.
    source_module: "data_management"
    source_model: "Dwelling"
    primary_grain: "household"
    default_refresh_cadence: "daily"
    questionnaire_sections: ["G1-G7"]

  - code: "utilities"
    label: "Utilities & services"
    description: >
      One row per household. Cooking fuel, lighting energy,
      drinking water source, toilet facility, waste disposal.
    source_module: "data_management"
    source_model: "Utilities"
    primary_grain: "household"
    default_refresh_cadence: "daily"
    questionnaire_sections: ["G8-G14"]

  - code: "livelihood"
    label: "Livelihood & agriculture"
    description: >
      One row per household. Main livelihood source, agricultural
      zone, land ownership and title.
    source_module: "data_management"
    source_model: "Livelihood"
    primary_grain: "household"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["G16", "H"]

  - code: "food_security"
    label: "Food security (FIES)"
    description: >
      WFP-aligned Food Insecurity Experience Scale per household,
      and the eight-item raw score (0-8).
    source_module: "data_management"
    source_model: "FoodSecurity"
    primary_grain: "household"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["I1-I8"]

  - code: "food_consumption"
    label: "Food consumption (FCS)"
    description: >
      WFP Food Consumption Score per household, with days-eaten and
      source per food group.
    source_module: "data_management"
    source_model: "FoodConsumption"
    primary_grain: "household"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["I9-I17"]

  - code: "health"
    label: "Health (chronic illness)"
    description: >
      One row per member 2+ years. Chronic illness presence flag and
      (encrypted) typed list.
    source_module: "data_management"
    source_model: "Health"
    primary_grain: "member"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["D1-D2"]

  - code: "disability"
    label: "Disability (Washington Group)"
    description: >
      One row per member 2+ years. Six WG-SS dimensions plus the
      derived `wg_disability_flag` (true when any dimension is
      'a lot of difficulty' or 'cannot do').
    source_module: "data_management"
    source_model: "Disability"
    primary_grain: "member"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["D3-D8"]

  - code: "education"
    label: "Education"
    description: >
      One row per member 3+ years. Literacy, attendance, highest
      grade, why-stopped reasons.
    source_module: "data_management"
    source_model: "Education"
    primary_grain: "member"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["E"]

  - code: "employment"
    label: "Employment"
    description: >
      One row per member 7+ years. Main activity, sector, status,
      government-programme history, savings.
    source_module: "data_management"
    source_model: "Employment"
    primary_grain: "member"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["F"]

  - code: "asset_ownership"
    label: "Asset ownership"
    description: >
      Repeat-group. One row per asset-type per household. Count
      capped at 9 per questionnaire G15.
    source_module: "data_management"
    source_model: "AssetOwnership"
    primary_grain: "household_asset"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["G15"]

  - code: "shock"
    label: "Shock event"
    description: >
      Repeat-group. One row per shock event per household with type,
      severity, livelihoods affected, event date.
    source_module: "data_management"
    source_model: "Shock"
    primary_grain: "household_shock"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["K1-K4"]

  - code: "coping_strategy"
    label: "Coping strategy"
    description: >
      Repeat-group. One row per (household, strategy_type, category)
      covering livelihood-coping (L01) and food-coping (L02).
    source_module: "data_management"
    source_model: "CopingStrategy"
    primary_grain: "household_strategy"
    default_refresh_cadence: "weekly"
    questionnaire_sections: ["L1", "L2"]

  - code: "pmt"
    label: "PMT scoring"
    description: >
      Latest PMT result per household — score, band, vulnerability
      tier, computation timestamp. Derived from apps.pmt.PMTResult.
    source_module: "pmt"
    source_model: "PMTResult"
    primary_grain: "household"
    default_refresh_cadence: "daily"
    questionnaire_sections: []
    notes: >
      Driven by `mv_explorer_household_by_subcounty_pmt`. PMT band
      itself is `derived_from` the active PMTModelVersion's
      `band_cutoffs`.

  - code: "referral"
    label: "Programme referrals"
    description: >
      One row per referral of a household to a partner programme.
      Status, eligibility-rule version, lifecycle timestamps.
    source_module: "referral"
    source_model: "Referral"
    primary_grain: "household_referral"
    default_refresh_cadence: "daily"
    questionnaire_sections: []

  - code: "programme_enrolment"
    label: "Programme enrolment"
    description: >
      One row per programme-side enrolment event for a household.
      Status, effective date, exit reason.
    source_module: "referral"
    source_model: "ProgrammeEnrolment"
    primary_grain: "household_enrolment"
    default_refresh_cadence: "daily"
    questionnaire_sections: []

  - code: "geography"
    label: "Geographic frame (UBOS)"
    description: >
      The UBOS GeographicUnit hierarchy used for projection +
      filtering. Read-only; variables here describe the *frame*,
      not household data.
    source_module: "reference_data"
    source_model: "GeographicUnit"
    primary_grain: "geographic_unit"
    default_refresh_cadence: "manual"
    questionnaire_sections: ["A1-A6"]


# =============================================================================
# Variables
# =============================================================================

variables:

  # ---- Geography (UBOS frame) -----------------------------------------------

  - code: "geography.sub_region_code"
    label: "Sub-region (UBOS code)"
    definition: "One of the nine UBOS statistical sub-regions used as the PostgreSQL partition key and the Personal-class aggregation floor."
    unit: ""
    source_module: "reference_data"
    source_model: "GeographicUnit"
    source_field: "code"
    source_questionnaire_path: "A.1"
    privacy_class: "Public"
    refresh_cadence: "manual"
    expected_completeness_baseline: 100.0
    geographic_minimum_level: "sub_region"
    value_domain: "ubos_sub_region_codes"
    notes: "Always required on every household; cannot be null at promotion."

  - code: "geography.district_code"
    label: "District / City (UBOS code)"
    definition: "UBOS administrative district or city. There are ~146 districts/cities at v2 of the frame."
    unit: ""
    source_module: "reference_data"
    source_model: "GeographicUnit"
    source_field: "code"
    source_questionnaire_path: "A.2"
    privacy_class: "Public"
    refresh_cadence: "manual"
    expected_completeness_baseline: 100.0
    geographic_minimum_level: "district"
    value_domain: "ubos_district_codes"

  - code: "geography.county_code"
    label: "County / Municipality (UBOS code)"
    definition: "UBOS county or municipality."
    unit: ""
    source_module: "reference_data"
    source_model: "GeographicUnit"
    source_field: "code"
    source_questionnaire_path: "A.3"
    privacy_class: "Public"
    refresh_cadence: "manual"
    expected_completeness_baseline: 100.0
    geographic_minimum_level: "district"

  - code: "geography.sub_county_code"
    label: "Sub-county / Division (UBOS code)"
    definition: "UBOS sub-county, division or town council. This is the discovery floor — aggregates below this level are refused."
    unit: ""
    source_module: "reference_data"
    source_model: "GeographicUnit"
    source_field: "code"
    source_questionnaire_path: "A.4"
    privacy_class: "Public"
    refresh_cadence: "manual"
    expected_completeness_baseline: 100.0
    geographic_minimum_level: "sub_county"
    value_domain: "ubos_sub_county_codes"

  - code: "geography.parish_code"
    label: "Parish / Ward (UBOS code)"
    definition: "UBOS parish or ward. NOT available on the discovery path — record-level handoff to API-DRS required."
    unit: ""
    source_module: "reference_data"
    source_model: "GeographicUnit"
    source_field: "code"
    source_questionnaire_path: "A.5"
    privacy_class: "Personal"
    refresh_cadence: "manual"
    expected_completeness_baseline: 100.0
    geographic_minimum_level: "sub_county"
    aggregated_only: false
    requires_drs_handoff: true
    notes: "Below the discovery floor. Catalogue lists it; query builder disables it; aggregate endpoint 422s. See ADR-0023 §D4."

  - code: "geography.village_code"
    label: "LC1 / Village / Cell (UBOS code)"
    definition: "Optional UBOS village or cell. Often unknown at parish-walk-in capture."
    unit: ""
    source_module: "reference_data"
    source_model: "GeographicUnit"
    source_field: "code"
    source_questionnaire_path: "A.6"
    privacy_class: "Personal"
    refresh_cadence: "manual"
    expected_completeness_baseline: 35.0
    geographic_minimum_level: "sub_county"
    aggregated_only: false
    requires_drs_handoff: true
    notes: "Only ~19 of 10,872 parishes carry seeded village rows in the UBOS v2 frame. Sparse."

  # ---- Household — geography + administrative -------------------------------

  - code: "household.sub_region_code"
    label: "Household sub-region"
    definition: "Sub-region the household is administratively assigned to (denormalised partition key)."
    unit: ""
