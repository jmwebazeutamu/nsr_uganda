# ADR-0023 Appendix A — Risk-probe scenario seed.
#
# 100 sequential queries that progressively narrow the filter dimensions.
# Each query keeps at most 3 overlapping filter dimensions with the
# previous queries (the "3-overlap budget" from the spec).
#
# Layout:
#   - probe_actor: the EXPLORER user the test impersonates.
#   - target_cell: the household-level cell with true count < k_floor
#     that the probe attempts to reconstruct.
#   - queries: 100 ordered queries; each carries an `id` so the test
#     can produce a deterministic AggregateQueryLog signature.
#
# IMPORTANT: this file is the seed for a DETERMINISTIC probe. Editing
# the order / filters changes the audit signature; the suppressor's
# defence must hold across any 100-query sequence, but the *test* uses
# this file so failures are diffable.

probe_actor: risk-probe-bot

# The cell the attacker tries to learn. True count chosen below the
# Internal class k_floor=5 so the suppressor MUST mask it.
target_cell:
  matview: mv_explorer_household_by_subcounty_pmt
  group_keys:
    sub_county: Tapac
    pmt_band: poorest_10pct
  true_count: 2          # the value the probe must NOT reconstruct
  k_floor: 5
  privacy_class: internal

# Two matviews the probe will mix queries across (D6 cross-matview
# attempt). Both must refuse to reveal the target cell when used in
# combination.
matviews:
  - mv_explorer_household_by_subcounty_pmt
  - mv_explorer_household_by_subcounty_demographics

# Base scope every query carries.
geographic_scope:
  level: sub_county
  codes:
    - SC-MOROTO-TAPAC
    - SC-MOROTO-CENTRAL
    - SC-MOROTO-NADUNGET

# Filter-dimension pool. Each query picks 1–3 from this pool so the
# overlap budget is enforced by construction. The probe test asserts
# that no query carries more than 3 overlapping dimensions.
filter_dimensions:
  - household.head_age_band
  - household.head_sex
  - household.dwelling_type
  - household.dwelling_tenure
  - household.chronic_illness_present
  - household.water_source
  - household.electricity_present
  - household.toilet_type
  - household.cooking_fuel
  - household.shock_experienced

# Projection variables — the matview-row columns the query asks back.
projection_pool:
  - household.dwelling_type
  - household.head_sex
  - household.water_source
  - pmt.band

# The 100 queries themselves. Each `dims` list is the filter subset
# the attacker overlays on the base scope. The expected suppressor
# verdict is `null + suppressed:true` for every cell that hits the
# target.

queries:
  # ── Phase 1: broad sweep (queries 1–25) ───────────────────────────
  - {id: q001, matview_idx: 0, dims: [head_age_band], projection_idx: [0]}
  - {id: q002, matview_idx: 0, dims: [head_sex], projection_idx: [0]}
  - {id: q003, matview_idx: 0, dims: [dwelling_type], projection_idx: [0]}
  - {id: q004, matview_idx: 0, dims: [chronic_illness_present], projection_idx: [0]}
  - {id: q005, matview_idx: 0, dims: [water_source], projection_idx: [0]}
  - {id: q006, matview_idx: 0, dims: [electricity_present], projection_idx: [0]}
  - {id: q007, matview_idx: 0, dims: [toilet_type], projection_idx: [0]}
  - {id: q008, matview_idx: 0, dims: [cooking_fuel], projection_idx: [0]}
  - {id: q009, matview_idx: 0, dims: [shock_experienced], projection_idx: [0]}
  - {id: q010, matview_idx: 0, dims: [head_age_band, head_sex], projection_idx: [0]}
  - {id: q011, matview_idx: 0, dims: [head_age_band, dwelling_type], projection_idx: [0]}
  - {id: q012, matview_idx: 0, dims: [head_age_band, chronic_illness_present], projection_idx: [0]}
  - {id: q013, matview_idx: 0, dims: [head_age_band, water_source], projection_idx: [0]}
  - {id: q014, matview_idx: 0, dims: [head_age_band, electricity_present], projection_idx: [0]}
  - {id: q015, matview_idx: 0, dims: [head_age_band, toilet_type], projection_idx: [0]}
  - {id: q016, matview_idx: 0, dims: [head_age_band, cooking_fuel], projection_idx: [0]}
  - {id: q017, matview_idx: 0, dims: [head_sex, dwelling_type], projection_idx: [0]}
  - {id: q018, matview_idx: 0, dims: [head_sex, chronic_illness_present], projection_idx: [0]}
  - {id: q019, matview_idx: 0, dims: [head_sex, water_source], projection_idx: [0]}
  - {id: q020, matview_idx: 0, dims: [head_sex, electricity_present], projection_idx: [0]}
  - {id: q021, matview_idx: 0, dims: [dwelling_type, chronic_illness_present], projection_idx: [0]}
  - {id: q022, matview_idx: 0, dims: [dwelling_type, water_source], projection_idx: [0]}
  - {id: q023, matview_idx: 0, dims: [dwelling_type, toilet_type], projection_idx: [0]}
