  - {id: q050, matview_idx: 0, dims: [head_age_band, head_sex, dwelling_type], projection_idx: [1]}

  # ── Phase 3: differencing attempts (queries 51–75) ────────────────
  # Pairs designed so Q1 - Q2 would normally yield a small cell —
