openapi: 3.1.0
info:
  title: NSR MIS — Data Integration Hub (DIH) API
  version: 0.1.0
  description: |
    DIH ingest pipeline + source-system credentialing. Today, the credentialing
    surface (KoboCredential CRUD, "Test connection" action) is exposed through
    Django admin only — see ADR-0007. This spec captures the data shapes the
    admin manipulates so future REST endpoints can adopt them verbatim.

    The promotion API + RawLanding pipeline endpoints are documented in the
    DIH §4.6 of the SAD; this file focuses on the connector-framework
    contracts introduced in US-S8-005 and US-S11-003.

servers:
  - url: https://nsr-mis.local/api/dih/v1
    description: Dev (admin-only surface; not yet exposed via REST)

tags:
  - name: connector-framework
    description: Connector registry + per-kind credentialing.
  - name: connector-runs
    description: Audit-bearing run records (IMPORT and TEST).

paths:
  /source-systems:
    get:
      tags: [connector-framework]
      summary: List registered source systems
      operationId: listSourceSystems
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceSystem"

  /source-systems/{id}/test-connection:
    post:
      tags: [connector-framework]
      summary: Probe the upstream credentialed by this SourceSystem.
      description: |
        Mirror of the Django-admin "Test connection" action. Writes a
        ConnectorRun row of run_type=TEST and emits an AuditEvent
        (action=test_connection). Returns the ConnectionTestResult shape.
        Idempotent — safe to call repeatedly.
      operationId: testSourceSystemConnection
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, description: ULID }
      responses:
        "200":
          description: Probe completed (status reflects ok/error in body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"
        "404":
          description: Source system not found
        "409":
          description: Source kind has no live test_connection (NIRA/UBOS today)
        "412":
          description: No *Credential row exists yet for this SourceSystem

  /connector-runs:
    get:
      tags: [connector-runs]
      summary: List ConnectorRun rows
      operationId: listConnectorRuns
      parameters:
        - name: run_type
          in: query
          schema: { $ref: "#/components/schemas/ConnectorRunType" }
          description: "Filter by IMPORT (default operational view) or TEST (admin probes)"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorRun"

components:
  schemas:
    SourceSystemKind:
      type: string
      description: |
        Locked enum mirroring `ingestion_hub.models.SourceSystemKind`.
        Kinds NOT in `SUPPORTED_KINDS` (see admin_credentials.py) appear in
        the admin dropdown with a "(coming soon)" suffix and reject any
        credentialing attempt.
      enum: [ubos, capi_walkin, web, kobo, wfp_scope, odk, partner_mis]

    SourceSystem:
      type: object
      required: [id, code, name, kind, is_active]
      properties:
        id:
          type: string
          description: ULID
        code:
          type: string
          maxLength: 32
          description: Operator-readable code, e.g. KOBO-PILOT
        name:
          type: string
          maxLength: 128
        kind:
          $ref: "#/components/schemas/SourceSystemKind"
        description:
          type: string
        is_active:
          type: boolean
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ConnectionTestResult:
      type: object
      description: |
        Shape returned by every `Connector.test_connection()` implementation.
        Renders directly in the Django admin "Test connection" message.
      required: [ok, latency_ms]
      properties:
        ok:
          type: boolean
        latency_ms:
          type: integer
          description: Wall-clock for the whole round-trip including retries
          minimum: 0
        server_version:
          type: string
          nullable: true
          description: |
            Best-effort upstream version (X-OpenRosa-Version header on Kobo).
            None when the upstream doesn't expose it.
        error:
          type: string
          nullable: true
          description: |
            Human-readable error on failure. Values used today:
              * "server_url and token required" — short-circuit (no HTTP call)
              * "auth_failed: token rejected by upstream"
              * "upstream {status_code}"
              * Free-form Requests exception message on network failure

    ConnectorRunType:
      type: string
      description: |
        Distinguishes audit-bearing TEST probes (admin "Test connection"
        action) from real IMPORT runs. RPT promotion-latency dashboards
        filter on IMPORT so test probes don't skew statistics.
      enum: [import, test]

    ConnectorRunStatus:
      type: string
      enum: [pending, running, succeeded, failed, quarantined]

    ConnectorRun:
      type: object
      required: [id, connector_id, run_type, status, started_at]
      properties:
        id:
          type: string
          description: ULID
        connector_id:
          type: string
          description: ULID FK to Connector
        run_type:
          $ref: "#/components/schemas/ConnectorRunType"
        status:
          $ref: "#/components/schemas/ConnectorRunStatus"
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
        records_received: { type: integer, minimum: 0 }
        records_landed: { type: integer, minimum: 0 }
        records_staged: { type: integer, minimum: 0 }
        records_promoted: { type: integer, minimum: 0 }
        records_quarantined: { type: integer, minimum: 0 }
        records_rejected: { type: integer, minimum: 0 }
        note:
          type: string
          description: Operator-visible one-liner; for TEST runs holds the latency + error

    # Per-kind credential schemas. Each new kind adds a sibling schema here
    # and a sibling *Credential model + form in code.
    KoboCredentialAdminWrite:
      type: object
      description: |
        Shape captured by the Django admin `KoboCredentialForm`. The
        username/password fields are TRANSIENT — used once to mint a Knox
        token via Kobo's `/token/` endpoint, then discarded. Only the
        encrypted token is persisted.
      required: [server_url]
      properties:
        server_url:
          type: string
          format: uri
          example: https://kobo.humanitarianresponse.info
        username:
          type: string
          description: Required on first save; optional on edit (blank keeps existing token)
        password:
          type: string
          format: password
          description: Required on first save; never persisted

    KoboCredentialAdminRead:
      type: object
      description: |
        Read shape of a stored Kobo credential. The token itself is never
        returned through any API; only the bookkeeping fields are visible.
      required: [id, source_system_id, server_url, acquired_at]
      properties:
        id: { type: string, description: ULID }
        source_system_id: { type: string, description: ULID }
        server_url: { type: string, format: uri }
        acquired_by_username:
          type: string
          description: Kobo username that minted the token (audit lineage)
        acquired_at: { type: string, format: date-time }
        last_test_at: { type: string, format: date-time, nullable: true }
        last_test_ok: { type: boolean, nullable: true }

paths_appended_2026_05_25:
  # ─────────────────────────────────────────────────────────────
  # StageRecord verbs added during the May DIH lifecycle build.
  # The existing /api/v1/dih/stage-records/ list/retrieve are auto-
  # generated by DRF + drf-spectacular and aren't repeated here.
  # ─────────────────────────────────────────────────────────────
  /api/v1/dih/walk-in-submissions/:
    post:
      tags: [dih]
      summary: Submit a household captured at a parish office
      description: |
        Opens a one-shot ConnectorRun under PARISH-WALKIN, lands the
        canonical payload, stages it. Returns the StageRecord —
        provisional_registry_id becomes the confirmed Registry ID on
        promotion.
      requestBody:
        content:
          application/json:
            schema: { type: object, description: Canonical household payload }
      responses:
        "201": { description: StageRecord created }
        "400": { description: payload invalid or parish source not seeded }
  /api/v1/dih/stage-records/{id}/quarantine/:
    post:
      tags: [dih]
      summary: Archive a quality-failed stage record
      description: |
        One-way transition quality_failed → quarantined. Quarantined
        records cannot be promoted. Reason is mandatory and persisted
        on the audit trail.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [actor, reason]
              properties:
                actor: { type: string, maxLength: 64 }
                reason: { type: string }
      responses:
        "200": { description: Updated StageRecord }
        "400": { description: not quality_failed, or reason missing }
  /api/v1/dih/connector-runs/{id}/delete/:
    post:
      tags: [dih]
      summary: Delete a ConnectorRun + all dependents (US-S11-023)
      description: |
        Hard-delete the ConnectorRun, walking the PROTECT FK chain
        in one atomic transaction:
        FastTrackAuditSample → PromotionDecision → Quarantine →
        StageRecord → RawLanding → ConnectorRun.

        Refuses when the run is PENDING/RUNNING, when
        records_promoted > 0, or when any StageRecord on the run is
        in state=PROMOTED. The audit-lineage chain documented in
        AC-DIH-LINEAGE survives because no promoted record is ever
        removed.

        Guarded by IsDihTrigger (Sys Admin + NSR Unit Coordinator).
        Emits `dih.connector.run_deleted` with the cascade counts.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 512
                  description: |
                    Operator-supplied reason recorded in the
                    AuditEvent. Optional in the schema, required by
                    the confirm modal in the UI.
      responses:
        "200":
          description: Cascade counts
          content:
            application/json:
              schema:
                type: object
                required: [deleted_run_id, source_code]
                properties:
                  deleted_run_id:               { type: string }
                  source_code:                  { type: string }
                  fast_track_samples_deleted:   { type: integer, minimum: 0 }
                  promotion_decisions_deleted:  { type: integer, minimum: 0 }
                  quarantine_rows_deleted:      { type: integer, minimum: 0 }
                  stage_records_deleted:        { type: integer, minimum: 0 }
                  raw_landings_deleted:         { type: integer, minimum: 0 }
        "400": { description: still running / has promoted records }
        "403": { description: caller lacks IsDihTrigger permission }
  /api/v1/dih/source-systems/{id}/forms/:
    get:
      tags: [dih]
      summary: List deployed forms for a Kobo SourceSystem (US-S11-022)
      description: |
        Feeds the Run-connector modal's form-picker dropdown. Returns
        every form the upstream Kobo workspace exposes; the client
        filters to `deployed: true` for the picker. Kobo-only for v1;
        non-Kobo kinds 400. Guarded by IsDihTrigger.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Form catalogue
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [uid, deployed]
                  properties:
                    uid:        { type: string }
                    name:       { type: string }
                    asset_type: { type: string }
                    deployed:   { type: boolean }
        "400": { description: non-Kobo / missing credentials / list_forms failed }
        "403": { description: caller lacks IsDihTrigger permission }
  /api/v1/dih/source-systems/{id}/trigger-run/:
    post:
      tags: [dih]
      summary: Trigger an operator-initiated connector pull (US-S11-021, S11-022)
      description: |
        Pulls submissions for this SourceSystem through the same code
        path as the `pull_kobo_submissions_action` admin action.
        Kobo-only for v1 — non-Kobo kinds 400. Guarded by IsDihTrigger
        (Sys Admin or NSR Unit Coordinator). Refuses when another run
        is pending/running, when no active DPA exists
        (AC-DIH-DPA-REQUIRED), or when the source has no credential or
        no deployed form. A `dih.connector.triggered` AuditEvent is
        emitted regardless of outcome.

        US-S11-022 added `form_uid`: the operator picks which form to
        pull when a Kobo workspace carries multiple deployed forms.
        Falls back to the form pinned on Connector.config, then to
        the first deployed form, when omitted.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dry_run:
                  type: boolean
                  default: false
                  description: |
                    If true, opens the ConnectorRun as run_type=TEST,
                    exercises credentials + list_forms, counts but does
                    NOT land submission rows.
                form_uid:
                  type: string
                  description: |
                    Optional Kobo form UID. Must appear in the
                    /forms/ response; otherwise the trigger 400s.
      responses:
        "200":
          description: Pull complete
          content:
            application/json:
              schema:
                type: object
                required: [run_id, source_code, form_uid, dry_run,
                           landed, staged, quarantined, errored, note]
                properties:
                  run_id: { type: string, description: ULID of the ConnectorRun }
                  source_code: { type: string }
                  form_uid: { type: string }
                  form_name: { type: string }
                  dry_run: { type: boolean }
                  landed: { type: integer, minimum: 0 }
                  staged: { type: integer, minimum: 0 }
                  quarantined: { type: integer, minimum: 0 }
                  errored: { type: integer, minimum: 0 }
                  stage_states:
                    type: object
                    additionalProperties: { type: integer }
                  geo_backfill_created: { type: integer, minimum: 0 }
                  batch_cap_hit: { type: boolean }
                  note: { type: string }
        "400": { description: precondition unmet (non-Kobo / no DPA / no credentials / concurrent run) }
        "403": { description: caller lacks IsDihTrigger permission }
  /api/v1/dih/stage-records/{id}/edit/:
    post:
      tags: [dih]
      summary: In-place correction of a stage record's canonical payload
      description: |
        Sparse edit of the canonical_payload before promotion. Allowed
        only in states {provisional, quality_failed, ddup_review}. Only
        whitelisted paths can be edited (gps_*, members.<i>.<safe field>)
        — NIN, geographic chain, and consent are NOT editable; those
        require re-capture.

        AC-DIH-EDIT-NO-SELF-APPROVE: the operator who edits cannot also
        promote (mirrors the DQA / DDUP / PMT dual-approval pattern).
        Re-runs DQA after the edit; if every blocking failure clears,
        a quality_failed record returns to provisional automatically.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [actor, reason, field_changes]
              properties:
                actor: { type: string, maxLength: 64 }
                reason: { type: string }
                field_changes:
                  type: object
                  description: |
                    Dotted-path → new-value map. Each path must match
                    EDITABLE_PATH_PATTERNS in
                    apps.ingestion_hub.services.
                  additionalProperties: true
                  example:
                    "members.0.telephone_1": "+256 786 999999"
                    "gps_accuracy_m": "4.50"
      responses:
        "200": { description: Updated StageRecord }
        "400": { description: state guard / whitelist / shape violation }
