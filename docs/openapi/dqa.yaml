openapi: 3.1.0
info:
  title: NSR MIS — DAT-DQA
  version: "0.3.0"
  description: |
    Data Quality Assurance rules engine + lifecycle endpoints.
    Authoritative source for rule definition, preview, and
    approval workflow. The DRF auto-generated schema at
    /api/schema/?format=openapi-yaml is the deploy-time spec;
    this file is the human-readable contract.

    See ADR-0009 for the design context behind US-076 / US-077 / US-079.

servers:
  - url: /api/v1/dqa

paths:
  /rules/:
    get:
      tags: [dqa]
      summary: List DQA rules
      responses:
        "200":
          description: Paginated rule list
    post:
      tags: [dqa]
      summary: Create a DRAFT rule (DQA Author only)
      description: |
        Restricted to users in the `dqa_author` Django group (or
        superusers). Returns the persisted rule with status="draft".
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/DqaRuleCreate" } }
      responses:
        "201": { description: Rule created }
        "403": { description: Not a DQA Author }

  /rules/{id}/:
    get:
      tags: [dqa]
      summary: Retrieve a DQA rule
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses: { "200": { description: Rule detail } }
    put:
      tags: [dqa]
      summary: Update a DRAFT rule (DQA Author only)
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/DqaRuleCreate" } }
      responses:
        "200": { description: Rule updated }
        "403": { description: Not a DQA Author }
    patch:
      tags: [dqa]
      summary: Patch a DRAFT rule (DQA Author only)
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Rule patched }
        "403": { description: Not a DQA Author }

  /rules/{id}/preview/:
    post:
      tags: [dqa]
      summary: Preview rule impact on a sample (US-077)
      description: |
        Evaluates the rule against a deterministic random sample of
        records of the requested type. Returns pass/fail counts and
        up to 10 IDs of failing records. **Record values are never
        returned.** Persists a DqaRulePreviewRun audit row.
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [record_type]
              properties:
                sample_size: { type: integer, minimum: 1, maximum: 10000, default: 50 }
                record_type:
                  type: string
                  enum: [member, household]
      responses:
        "200":
          description: Preview counts + sample failed IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  pass_count: { type: integer }
                  fail_count: { type: integer }
                  sample_failed_record_ids:
                    type: array
                    maxItems: 10
                    items: { type: string }
        "400": { description: Unknown record_type or bad sample_size }

  /rules/{id}/submit-for-approval/:
    post:
      tags: [dqa]
      summary: Submit a DRAFT rule for approval
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        "200":
          description: Rule advanced to PENDING_APPROVAL, AuditEvent emitted
          content:
            application/json: { schema: { $ref: "#/components/schemas/DqaRule" } }
        "400": { description: Bad state (not DRAFT) }

  /rules/{id}/approve/:
    post:
      tags: [dqa]
      summary: Approve a PENDING rule (note required)
      description: |
        Note is required (audit chain). Author cannot approve their
        own rule (AC-DQA-DUAL-ACTOR). On success, rule advances to
        ACTIVE and emits a `dqa.rule_version.approved` AuditEvent.
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note: { type: string, minLength: 1 }
      responses:
        "200": { description: Rule approved }
        "400":
          description: |
            Bad state, missing note, blank note, or self-approval attempt.

  /rules/{id}/reject/:
    post:
      tags: [dqa]
      summary: Reject a PENDING rule (reason required)
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 1 }
      responses:
        "200": { description: Rule rejected }
        "400": { description: Bad state, missing reason, or self-rejection }

  /rules/{id}/retire/:
    post:
      tags: [dqa]
      summary: Retire an ACTIVE rule
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        "200": { description: Rule retired }
        "400": { description: Bad state (not ACTIVE) }

  /results/:
    get:
      tags: [dqa]
      summary: List DQA evaluation results (read-only)
      responses: { "200": { description: Paginated result list } }

  # ---------------------------------------------------------------------------
  # US-S11-044 — intra-household evaluation surface.
  # Gated on DQA_INTRA_HOUSEHOLD_ENABLED; 503 when off.
  # ---------------------------------------------------------------------------

  /evaluate/household:
    post:
      tags: [dqa]
      summary: Evaluate intra-household DQA rules
      description: |
        Runs the active intra-household rule catalog (filtered by
        stage) against the supplied household payload and returns
        per-rule pass/fail/error plus an aggregate outcome.

        Call modes:
          - persist=false (default): pure evaluation. The wizard uses
            this on each field-edit batch.
          - persist=true: writes a DqaEvaluation row + emits a
            `dqa.household.evaluated` AuditEvent. `household_id` is
            required (use the provisional Registry ID at DIH_INGEST).

        The pipeline (DIH ingest/promote, registry post-promote) calls
        with persist=true; the React wizard calls with persist=false.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EvaluateHouseholdRequest" }
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvaluateHouseholdResponse" }
        "400": { description: Missing household_id when persist=true }
        "503": { description: Feature flag DQA_INTRA_HOUSEHOLD_ENABLED is off }

  /evaluations/{household_id}:
    get:
      tags: [dqa]
      summary: List DQA evaluations for a household (newest first)
      parameters:
        - { name: household_id, in: path, required: true, schema: { type: string } }
        - name: stage
          in: query
          required: false
          schema:
            type: string
            enum: [dih_ingest, dih_promote, registry_post_promote]
        - name: outcome
          in: query
          required: false
          schema:
            type: string
            enum: [pass, review, block]
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: DqaEvaluation list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DqaEvaluation" }
        "503": { description: Feature flag off }

  /severity-vocabulary:
    get:
      tags: [dqa]
      summary: DQA severity vocabulary + UI tokens
      description: |
        Static-ish metadata bundle. Returns the severity vocabulary
        with display tokens (so the wizard, Rule Editor, and the
        household detail panel render the same icon/colour for the
        same severity) plus the enum surface for stage, category,
        scope, expression_type, and outcome — populated by the Rule
        Editor's dropdowns from one call.
      responses:
        "200":
          description: Vocabulary bundle
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeverityVocabulary" }
        "503": { description: Feature flag off }

components:
  schemas:
    DqaRule:
      type: object
      properties:
        id: { type: string, description: ULID }
        rule_id: { type: string }
        version: { type: integer }
        description: { type: string }
        severity:
          type: string
          description: |
            US-S11-044 expanded the vocabulary to
            block / reject_with_override / flag / info. Legacy values
            (blocking, warning) accepted on read for back-compat
            until the P2 cleanup commit ships.
          enum:
            - block
            - reject_with_override
            - flag
            - info
            - blocking
            - warning
        applicability_filter:
          type: object
          description: |
            Filter that decides whether a rule applies to a given
            record. Keys: entity, channel, geography, age_band,
            form_version. Empty means "applies to everything that
            matches the entity type".
        expression:
          type: object
          description: JSON-DSL rule. See SAD §4.2.1.
        error_message_template: { type: string }
        effective_from: { type: string, format: date, nullable: true }
        effective_to: { type: string, format: date, nullable: true }
        status:
          type: string
          enum: [draft, pending_approval, active, retired, rejected]
        author: { type: string }
        approved_by: { type: string }
        approved_at: { type: string, format: date-time, nullable: true }
        approval_note: { type: string }
        rejection_reason: { type: string }
        submitted_at: { type: string, format: date-time, nullable: true }
        # US-S11-044 additions.
        category:
          type: string
          enum: [intra_household, field_level, geographic, identity, duplicate]
        scope:
          type: string
          enum: [field, record, household, cross_household]
        expression_type:
          type: string
          enum: [dsl, python_callable, sql]
        stages:
          type: array
          items:
            type: string
            enum: [dih_ingest, dih_promote, registry_post_promote]
        parameters: { type: object }
        applies_to:
          type: object
          description: |
            Watched-fields manifest. Shape: {"household": [...], "members": [...]}.
            The wizard's validation panel subscribes only to rules whose
            applies_to overlaps the field being edited.
        test_fixtures:
          type: array
          description: |
            Pass/fail fixtures evaluated against the rule on every save,
            mirrored against the seed in CI to catch DSL typos.
          items:
            type: object
            properties:
              input: { type: object }
              expected_outcome:
                type: string
                enum: [pass, fail, error]
        message_template_i18n_key: { type: string }

    DqaRuleCreate:
      type: object
      required: [rule_id, version, description, severity, expression, author]
      properties:
        rule_id: { type: string }
        version: { type: integer }
        description: { type: string }
        severity:
          type: string
          description: |
            US-S11-044 expanded the vocabulary to
            block / reject_with_override / flag / info. Legacy values
            (blocking, warning) accepted on read for back-compat
            until the P2 cleanup commit ships.
          enum:
            - block
            - reject_with_override
            - flag
            - info
            - blocking
            - warning
        applicability_filter: { type: object }
        expression: { type: object }
        error_message_template: { type: string }
        effective_from: { type: string, format: date }
        effective_to: { type: string, format: date }
        author: { type: string }

    # ---------------------------------------------------------------------
    # US-S11-044 intra-household schemas
    # ---------------------------------------------------------------------

    EvaluateHouseholdRequest:
      type: object
      required: [payload, stage]
      properties:
        payload:
          type: object
          description: |
            Household dict per /docs/06_questionnaire.docx — household
            fields at top level plus a `members` array. The evaluator
            treats the input as opaque JSON; rules walk it via the DSL.
        stage:
          type: string
          enum: [dih_ingest, dih_promote, registry_post_promote]
        persist:
          type: boolean
          default: false
          description: When true, writes a DqaEvaluation row + emits AuditEvent.
        household_id:
          type: string
          description: Required when persist=true. Provisional Registry ID at DIH_INGEST.
        household_version:
          type: integer
          nullable: true
        evaluated_at:
          type: string
          format: date-time
          description: For deterministic replay (tests, audit walk-throughs).

    EvaluateHouseholdResponse:
      type: object
      properties:
        stage:
          type: string
          enum: [dih_ingest, dih_promote, registry_post_promote]
        outcome:
          type: string
          enum: [pass, review, block]
        evaluator_service_version: { type: string }
        rules_evaluated: { type: integer }
        evaluation_id:
          type: string
          description: ULID. Only present when persist=true.
        results:
          type: array
          items: { $ref: "#/components/schemas/DqaRuleResult" }

    DqaRuleResult:
      type: object
      properties:
        rule_code: { type: string }
        rule_version: { type: integer }
        status:
          type: string
          enum: [pass, fail, error]
        severity:
          type: string
          enum: [block, reject_with_override, flag, info]
        message:
          type: string
          description: Interpolated error_message_template. Empty on pass.
        offending_member_ids:
          type: array
          items: { type: string }
          description: |
            Member line numbers / NINs the rule flagged. Used by the
            household detail panel + AC-DUPLICATE-MEMBER → Dedup hook.
        parameters_used: { type: object }

    DqaEvaluation:
      type: object
      properties:
        id: { type: string, description: ULID }
        household_id: { type: string }
        household_version: { type: integer, nullable: true }
        stage:
          type: string
          enum: [dih_ingest, dih_promote, registry_post_promote]
        outcome:
          type: string
          enum: [pass, review, block]
        results:
          type: array
          items: { $ref: "#/components/schemas/DqaRuleResult" }
        evaluator_service_version: { type: string }
        actor: { type: string }
        evaluated_at: { type: string, format: date-time }

    SeverityVocabulary:
      type: object
      properties:
        severities:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              label: { type: string }
              token:
                type: string
                description: Design token from /docs/04 §4 (status-danger, status-warning, ...).
              blocks_save:
                type: boolean
                description: Wizard / pipeline must refuse Save / promotion on fail.
              description: { type: string }
        stages:
          type: array
          items:
            type: object
            properties:
              value: { type: string }
              label: { type: string }
        categories: { type: array, items: { type: object } }
        scopes: { type: array, items: { type: object } }
        expression_types: { type: array, items: { type: object } }
        outcomes: { type: array, items: { type: object } }
        evaluator_service_version: { type: string }
