# Apache vhost for the NSR MIS dev/staging site on the shared quasar.ug box.
#
# HTTP (:80) only. certbot --apache adds the :443 vhost + the http->https
# redirect at go-live, referencing the cert it provisions — do NOT add a
# :443 block here by hand (a missing SSLCertificateFile fails config-test
# and would break every other site on this Apache). After certbot runs,
# add `RequestHeader set X-Forwarded-Proto "https"` to the generated
# -le-ssl.conf so Django's SECURE_PROXY_SSL_HEADER sees https (see runbook).
#
# Install:
#   sudo cp infrastructure/apache/nsr-sris-dev.conf /etc/apache2/sites-available/
#   sudo a2ensite nsr-sris-dev && sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d nsr-sris-dev.quasar.ug    # after DNS resolves

<VirtualHost *:80>
    ServerName nsr-sris-dev.quasar.ug

    # WhiteNoise (in gunicorn) serves /static; sensitive /media is never
    # exposed (authenticated Django views only). Proxy everything to the
    # NSR web container on localhost:8005.
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8005/
    ProxyPassReverse / http://127.0.0.1:8005/

    ErrorLog ${APACHE_LOG_DIR}/nsr-sris-dev_error.log
    CustomLog ${APACHE_LOG_DIR}/nsr-sris-dev_access.log combined
</VirtualHost>
