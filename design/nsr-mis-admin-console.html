<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>NSR Admin Console — Uganda National Social Registry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="v0.1/tokens.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="app"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Shared design-system primitives -->
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="v0.1/components/error-boundary.jsx"></script>

  <!-- Data layer — same nsrApi + useApi the operator console uses,
       just pointed at /api/v1/admin/... endpoints. -->
  <script type="text/babel" src="v0.1/data/api-client.jsx"></script>
  <script type="text/babel" src="v0.1/data/use-choice-list.jsx"></script>

  <!-- Admin Console screens -->
  <!-- PMT (sprint 22) -->
  <script type="text/babel" src="v0.1/screens/screens-pmt-dashboard.jsx"></script>
  <script type="text/babel" src="v0.1/screens/screens-pmt-configuration.jsx"></script>

  <!-- Reference data (sprint 23 Cat 1 — live) -->
  <script type="text/babel" src="v0.1/screens/screens-admin-refdata-choicelists.jsx"></script>
  <script type="text/babel" src="v0.1/screens/screens-admin-refdata-geography.jsx"></script>

  <!-- Workflow (sprint 23 Cat 2 — prototype only, backend follows) -->
  <script type="text/babel" src="v0.1/screens/screens-admin-workflow-routing.jsx"></script>
  <script type="text/babel" src="v0.1/screens/screens-admin-workflow-dqa.jsx"></script>
  <script type="text/babel" src="v0.1/screens/screens-admin-workflow-ddup.jsx"></script>

  <!-- Security (sprint 23 Cat 3 — prototype only, backend follows) -->
  <script type="text/babel" src="v0.1/screens/screens-admin-security-roles.jsx"></script>
  <script type="text/babel" src="v0.1/screens/screens-admin-security-audit.jsx"></script>

  <!-- Approvals dashboard — unified queue across CL, DQA, PMT -->
  <script type="text/babel" src="v0.1/screens/screens-admin-approvals.jsx"></script>

  <!-- Detail / edit examples -->
  <script type="text/babel" src="v0.1/screens/screens-admin-details.jsx"></script>

  <!-- Chatbot Assistant (sprint 23 — ADR-0021, US-CHB-005, preview) -->
  <script type="text/babel" src="v0.1/screens/screens-chatbot-assistant.jsx"></script>

  <!-- Consent Management (Epic 19 — ADR-0024). consent-shared must load
       before the screens that read its vocabulary. -->
  <script type="text/babel" src="v0.1/screens/consent/consent-shared.jsx"></script>
  <script type="text/babel" src="v0.1/screens/consent/screens-consent-dpo-queue.jsx"></script>
  <script type="text/babel" src="v0.1/screens/consent/screens-consent-admin-stubs.jsx"></script>

  <!-- Admin app shell — sidebar nav + routing -->
  <script type="text/babel" src="v0.1/screens/app-admin.jsx"></script>
</body>
</html>
