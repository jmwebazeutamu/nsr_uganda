<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>NSR · Open Change Request</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../../styles.css"/>
  <style>
    /* Local — chip-style quick-add button used in the field composer */
    .cr-chip-btn {
      display: inline-flex; align-items: center;
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--neutral-300);
      border-radius: 14px;
      background: var(--neutral-0);
      color: var(--neutral-700);
      font-size: 12.5px; font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }
    .cr-chip-btn:hover {
      background: var(--neutral-50);
      border-color: var(--neutral-500);
      color: var(--neutral-900);
    }
    /* Locked-section overlay sigil */
    .cr-section[data-locked="1"]::after {
      content: "";
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#1F3864"/>
      <rect x="18" y="20" width="64" height="60" rx="4" fill="#F1F6FC"/>
      <circle cx="26" cy="32" r="3.5" fill="#1F3864"/>
      <rect x="33" y="30" width="42" height="4" rx="1" fill="#1F3864"/>
      <circle cx="26" cy="44" r="3.5" fill="#1565C0"/>
      <rect x="33" y="42" width="48" height="4" rx="1" fill="#1565C0"/>
      <circle cx="26" cy="56" r="3.5" fill="#8B6914"/>
      <rect x="33" y="54" width="36" height="4" rx="1" fill="#8B6914"/>
      <circle cx="26" cy="68" r="3.5" fill="#2E7D32"/>
      <rect x="33" y="66" width="40" height="4" rx="1" fill="#2E7D32"/>
      <text x="50" y="93" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#F1F6FC" text-anchor="middle">NSR · UPD</text>
    </svg>
  </template>
  <div id="app"></div>

  <!-- React + Babel -->

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Tweaks helper -->
  <script type="text/babel" src="../../../tweaks-panel.jsx"></script>

  <!-- Shared NSR kit -->
  <script type="text/babel" src="../../../components.jsx"></script>

  <!-- Change request — data, helpers, sections -->
  <script type="text/babel" src="screens-change-request.jsx"></script>
  <!-- Main screen component -->
  <script type="text/babel" src="app-change-request.jsx"></script>

  <!-- Standalone mount -->
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("app")).render(<ChangeRequestScreen/>);
  </script>
</body>
</html>
