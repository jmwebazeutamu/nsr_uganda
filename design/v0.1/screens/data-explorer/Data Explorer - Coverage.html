<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Data Explorer · Coverage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../../styles.css"/>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#1F3864"/>
      <rect x="18" y="22" width="64" height="56" rx="3" fill="#F1F6FC"/>
           <rect x="22" y="30" width="56" height="6" rx="1" fill="#2E7D32"/>
           <rect x="22" y="40" width="44" height="6" rx="1" fill="#2E7D32"/>
           <rect x="22" y="50" width="38" height="6" rx="1" fill="#B8741A"/>
           <rect x="22" y="60" width="24" height="6" rx="1" fill="#A93226"/>
      <text x="50" y="94" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#F1F6FC" text-anchor="middle">NSR · DATA EXPLORER</text>
    </svg>
  </template>
  <div id="app"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- d3 (full bundle): projection + path for the coverage choropleth.
       Full d3 is used rather than d3-geo alone because d3-geo's UMD needs
       d3-array on the global; the full bundle is self-contained and
       attaches window.d3.{geoMercator,geoPath}. The map degrades
       gracefully if this fails to load (offline) — the table still renders. -->
  <script src="https://unpkg.com/d3@7/dist/d3.min.js" crossorigin="anonymous"></script>

  <!-- Tweaks helper -->
  <script type="text/babel" src="../../../tweaks-panel.jsx"></script>

  <!-- Shared NSR kit -->
  <script type="text/babel" src="../../../components.jsx"></script>
  <script type="text/babel" src="../../data/api-client.jsx"></script>

  <!-- Data Explorer shared (data + DEShell) -->
  <script type="text/babel" src="data-explorer-shared.jsx"></script>

  <!-- Active screen -->
  <script type="text/babel" src="screens-data-explorer-coverage.jsx"></script>
</body>
</html>
