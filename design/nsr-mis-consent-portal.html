<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>NSR Consent Portal — Uganda National Social Registry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="v0.1/tokens.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="app"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Shared design-system primitives -->
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="v0.1/components/error-boundary.jsx"></script>

  <!-- Consent Management (Epic 19 — ADR-0024). consent-shared loads first so
       the screens that read its vocabulary resolve. -->
  <script type="text/babel" src="v0.1/screens/consent/consent-shared.jsx"></script>
  <script type="text/babel" src="v0.1/screens/consent/screens-consent-capture.jsx"></script>
  <script type="text/babel" src="v0.1/screens/consent/screens-consent-citizen.jsx"></script>

  <!-- Citizen portal shell — top nav + STUB auth context (Keycloak realm
       deferred, ADR-0024 D9). -->
  <script type="text/babel" src="v0.1/screens/consent/app-portal-consent.jsx"></script>
</body>
</html>
