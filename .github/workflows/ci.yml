name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - run: ruff check .

  test:
    name: Tests (pytest + Postgres+PostGIS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: nsr
          POSTGRES_PASSWORD: nsr
          POSTGRES_DB: nsr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nsr -d nsr"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://nsr:nsr@localhost:5432/nsr
      DJANGO_SECRET_KEY: ci-only
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - name: Django check
        run: python manage.py check
      - name: Migrate
        run: python manage.py migrate --noinput
      - name: Pytest
        run: pytest -q --cov=apps --cov-report=term-missing

  openapi:
    name: OpenAPI contract (drf-spectacular --validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - name: Generate + validate schema
        run: python manage.py spectacular --validate --fail-on-warn --file /tmp/schema.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: /tmp/schema.yaml

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install bandit
      - run: bandit -q -r apps nsr_mis -x apps/*/tests.py,apps/*/migrations

  deps:
    name: Dependency scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit --strict --disable-pip
