name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - run: ruff check .

  test:
    name: Tests (pytest + Postgres+PostGIS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: nsr
          POSTGRES_PASSWORD: nsr
          POSTGRES_DB: nsr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nsr -d nsr"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://nsr:nsr@localhost:5432/nsr
      DJANGO_SECRET_KEY: ci-only-secret-not-for-production
      # apps.security.checks fails-closed against the dev defaults when
      # DEBUG=False, so CI must supply non-default values for the trio.
      NSR_NIN_PEPPER: ci-only-pepper-not-for-production
      NSR_DATA_KEY: pAcD3lqJ8s1XbN_zRq2VtFGm4uYwHcKeOfTjUiZsPkA=
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - name: Django check
        run: python manage.py check
      - name: Migrate
        run: python manage.py migrate --noinput
      - name: Pytest
        run: pytest -q --cov=apps --cov-report=term-missing

  openapi:
    name: OpenAPI contract (drf-spectacular --validate)
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-only-secret-not-for-production
      NSR_NIN_PEPPER: ci-only-pepper-not-for-production
      NSR_DATA_KEY: pAcD3lqJ8s1XbN_zRq2VtFGm4uYwHcKeOfTjUiZsPkA=
      DEBUG: "True"  # spectacular doesn't need a DB; DEBUG=True skips the prod checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ".[dev]"
      - name: Generate + validate schema
        run: python manage.py spectacular --validate --fail-on-warn --file /tmp/schema.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: /tmp/schema.yaml

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install bandit
      - run: bandit -q -r apps nsr_mis -x apps/*/tests.py,apps/*/migrations

  deps:
    name: Dependency scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]" pip-audit
      # Audit the resolved dependency tree. `pip freeze --exclude-editable`
      # drops our own (editable) nsr-mis package; pip-audit -r --strict then
      # checks every remaining installed dist against the OSV/PyPI advisory
      # database. Fails the build on any vulnerability or unresolvable dist.
      - run: |
          pip freeze --exclude-editable > /tmp/installed.txt
          pip-audit --strict -r /tmp/installed.txt
