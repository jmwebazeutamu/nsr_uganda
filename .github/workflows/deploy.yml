name: Deploy

# Auto-deploy to the nsr-sris-dev.quasar.ug box after CI passes on main.
# Gated on CI success via workflow_run so a red main never ships; also
# runnable on demand (workflow_dispatch) for re-deploys / rollbacks.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # push the image to GHCR

env:
  IMAGE: ghcr.io/jmwebazeutamu/nsr_uganda

jobs:
  build-and-deploy:
    # Only when triggered manually OR by a SUCCESSFUL CI run on main.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the exact commit CI just validated.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH (pull + up + migrate)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          DIR=/home/jmwebaze/nsr_uganda
          # Refresh the compose file (the only deploy artifact on the host;
          # the image carries the entrypoint, .env is managed on the box).
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DIR/compose.prod.yml"
          $SSH "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            cd $DIR
            echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin
            docker compose -f compose.prod.yml --env-file .env pull
            docker compose -f compose.prod.yml --env-file .env up -d --remove-orphans
            docker logout ghcr.io
            docker image prune -f
            echo '--- post-deploy status ---'
            docker compose -f compose.prod.yml ps
          "
